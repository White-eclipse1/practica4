name: CI + Deploy Dev + Deploy Prod

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test -- --coverage

      - name: Build
        run: npm run build

      - name: Publish
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  deploy_dev:
    name: Deploy Dev
    needs: build
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy-Dev
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_SECRET }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy dist/practice4/index.js --name ${{ secrets.CLOUDFLARE_WORKER_NAME }} --compatibility-date 2026-02-26 --compatibility-flags=nodejs_compat --assets dist/client

  deploy_prod:
    name: Deploy Prod (Approval Required)
    needs: deploy_dev
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy-Prod
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_SECRET }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy dist/practice4/index.js --name ${{ secrets.CLOUDFLARE_WORKER_NAME }} --compatibility-date 2026-02-26 --compatibility-flags=nodejs_compat --assets dist/client