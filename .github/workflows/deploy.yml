name: Deploy to Cloudflare Workers (CI + CD)

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test (with coverage)
        run: npm run test -- --coverage

      - name: Build
        run: npm run build

      - name: Publish dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release:
    name: CD
    needs: build
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Show dist tree
        run: |
          echo "=== dist tree ==="
          ls -R dist

      - name: Verify required files exist
        run: |
          test -f dist/practice4/index.js && echo "OK: dist/practice4/index.js exists" || (echo "MISSING: dist/practice4/index.js" && exit 1)
          test -d dist/client && echo "OK: dist/client exists" || (echo "MISSING: dist/client" && exit 1)
          test -f dist/client/index.html && echo "OK: dist/client/index.html exists" || (echo "MISSING: dist/client/index.html" && exit 1)
        #w
      - name: Deploy-Dev (Workers)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_SECRET }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '3.114.0'
          command: deploy dist/practice4/index.js --name ancient-recipe-9c7b --compatibility-date 2026-03-01 --compatibility-flags=nodejs_compat --assets dist/client